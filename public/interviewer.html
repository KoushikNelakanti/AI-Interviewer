<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Interviewer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(120deg, #f6f9fc, #ddefff);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: #fff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      max-width: 800px;
      width: 100%;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .form-control, .btn {
      font-size: 1rem;
      border-radius: 8px;
    }

    .btn {
      padding: 10px 20px;
    }

    .section-box {
      background: #f8f9fa;
      border: 1px solid #e1e5ea;
      border-radius: 10px;
      padding: 15px;
      margin-top: 20px;
      min-height: 100px;
      max-height: 250px;
      overflow-y: auto;
    }

    .section-box i {
      color: #888;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🎙️ AI Interviewer Platform</h1>
  <div class="mb-3">
    <input type="text" class="form-control" id="role-input" placeholder="Enter role (e.g., Frontend Developer)" />
  </div>
  <div class="d-flex justify-content-center gap-3 mb-4">
    <button class="btn btn-primary" id="begin-btn" disabled>📄 Generate First Question</button>
    <button class="btn btn-danger" id="start-btn" disabled>🎤 Start Interview</button>
  </div>

  <div class="section-box" id="transcript">User: <i>Waiting for interaction...</i></div>
  <div class="section-box" id="ai-response">AI: <i>Waiting for interaction...</i></div>
</div>

<script src="./interviewer.js"></script>
</body>
</html>
